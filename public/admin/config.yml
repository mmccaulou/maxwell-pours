backend:
  name: github
  repo: mmccaulou/maxwell-pours
  branch: main
  base_url: https://maxwellpours.com

media_folder: public/images
public_folder: /images

collections:
  - name: posts
    label: Blog Posts
    folder: src/content/posts
    create: true
    extension: mdx
    format: frontmatter
    slug: "{{slug}}"
    fields:
      - label: Title
        name: title
        widget: string
      - label: Description
        name: description
        widget: string
        required: false
      - label: Publish Date
        name: pubDate
        widget: datetime
        date_format: YYYY-MM-DD
        time_format: false
      - label: Hero Image
        name: heroImage
        widget: image
        required: false
      - label: Category
        name: category
        widget: select
        required: false
        options:
          - { label: "In the Glass",  value: "in-the-glass"  }
          - { label: "On the Floor",  value: "on-the-floor"  }
          - { label: "At the Table",  value: "at-the-table"  }
          - { label: "Off the Map",   value: "off-the-map"   }
          - { label: "Punch Downs",   value: "punch-downs"   }
      - label: Draft
        name: draft
        widget: boolean
        default: false
      - label: Body
        name: body
        widget: markdown
